<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analytics — Saarang Portfolio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#090E14;color:#E8F4FD;min-height:100vh}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:#090E14;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1.2rem}
#loginScreen h1{font-size:1.4rem;color:#0EA5E9;letter-spacing:2px}
#loginScreen p{font-size:.75rem;color:#3E6280;letter-spacing:1px}
#pwInput{background:#0F1A24;border:1px solid rgba(14,165,233,0.3);color:#E8F4FD;padding:12px 20px;border-radius:10px;font-size:.95rem;font-family:monospace;width:260px;outline:none;text-align:center;letter-spacing:3px}
#pwInput:focus{border-color:#0EA5E9}
#loginBtn{background:#0EA5E9;color:#fff;border:none;padding:11px 32px;border-radius:100px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:monospace;letter-spacing:1px;transition:background .2s}
#loginBtn:hover{background:#38BDF8}
#loginErr{color:#f87171;font-size:.75rem;display:none}

/* DASHBOARD */
#dashboard{display:none;padding:2rem 3%}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.dash-header h1{font-size:1.2rem;color:#0EA5E9;letter-spacing:2px}
.dash-header a{color:#3E6280;font-size:.75rem;text-decoration:none}
.dash-header a:hover{color:#0EA5E9}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.stat-box{background:#0F1A24;border:1px solid rgba(14,165,233,0.12);border-radius:14px;padding:1.2rem 1.5rem}
.stat-val{font-size:2rem;font-weight:900;color:#0EA5E9;line-height:1}
.stat-lbl{font-size:.65rem;color:#3E6280;margin-top:.3rem;letter-spacing:1px;text-transform:uppercase}
#map{width:100%;height:420px;border-radius:16px;border:1px solid rgba(14,165,233,0.12);margin-bottom:2rem}
.visits-table{width:100%;border-collapse:collapse;font-size:.78rem}
.visits-table th{text-align:left;padding:.7rem 1rem;color:#3E6280;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid rgba(14,165,233,0.1)}
.visits-table td{padding:.7rem 1rem;border-bottom:1px solid rgba(14,165,233,0.06);color:#7FA8C4}
.visits-table tr:hover td{background:rgba(14,165,233,0.04)}
.no-data{text-align:center;color:#3E6280;padding:3rem;font-size:.8rem}
.clear-btn{background:transparent;border:1px solid rgba(248,113,113,0.3);color:#f87171;padding:6px 14px;border-radius:8px;font-size:.7rem;cursor:pointer;font-family:monospace;transition:background .2s}
.clear-btn:hover{background:rgba(248,113,113,0.1)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h1>🔐 Portfolio Analytics</h1>
  <p>Saarang Govinda Rajan · Private Dashboard</p>
  <input type="password" id="pwInput" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()"/>
  <button id="loginBtn" onclick="login()">Access Dashboard</button>
  <div id="loginErr">Incorrect password. Try again.</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-header">
    <h1>📊 Portfolio Analytics</h1>
    <div style="display:flex;gap:1rem;align-items:center">
      <button class="clear-btn" onclick="clearData()">Clear all data</button>
      <a href="index.html">← Back to Portfolio</a>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Total Visits</div></div>
    <div class="stat-box"><div class="stat-val" id="statCountries">0</div><div class="stat-lbl">Countries</div></div>
    <div class="stat-box"><div class="stat-val" id="statToday">0</div><div class="stat-lbl">Today</div></div>
    <div class="stat-box"><div class="stat-val" id="statLatest">—</div><div class="stat-lbl">Latest Visit</div></div>
  </div>

  <div id="map"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <div style="font-size:.7rem;color:#3E6280;letter-spacing:1px;text-transform:uppercase">Recent Visitors</div>
  </div>
  <table class="visits-table">
    <thead><tr><th>#</th><th>Time</th><th>Country</th><th>Region</th><th>City</th></tr></thead>
    <tbody id="visitsBody"></tbody>
  </table>
</div>

<script>
var PASS = 'harekrishna';

function login(){
  var val = document.getElementById('pwInput').value;
  if(val === PASS){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadDashboard();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwInput').value='';
  }
}

function clearData(){
  if(confirm('Clear all visitor data?')){
    localStorage.removeItem('sgr_visits');
    loadDashboard();
  }
}

function loadDashboard(){
  var visits = JSON.parse(localStorage.getItem('sgr_visits')||'[]');
  var today = new Date().toDateString();

  // Stats
  document.getElementById('statTotal').textContent = visits.length;
  var countries = [...new Set(visits.map(function(v){return v.country;}))];
  document.getElementById('statCountries').textContent = countries.length;
  var todayVisits = visits.filter(function(v){return new Date(v.time).toDateString()===today;});
  document.getElementById('statToday').textContent = todayVisits.length;
  if(visits.length>0){
    var latest = new Date(visits[visits.length-1].time);
    document.getElementById('statLatest').textContent = latest.toLocaleDateString();
  }

  // Map
  var map = L.map('map').setView([20,0],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© OpenStreetMap © CARTO',maxZoom:18
  }).addTo(map);

  if(visits.length===0){
    // No data yet
  } else {
    visits.forEach(function(v){
      if(v.lat && v.lng){
        L.circleMarker([v.lat,v.lng],{
          radius:7, fillColor:'#0EA5E9', color:'#38BDF8',
          weight:1.5, opacity:1, fillOpacity:0.75
        }).bindPopup(
          '<b>'+v.city+'</b><br>'+v.region+', '+v.country+'<br><small>'+new Date(v.time).toLocaleString()+'</small>'
        ).addTo(map);
      }
    });
  }

  // Table — most recent first
  var tbody = document.getElementById('visitsBody');
  tbody.innerHTML='';
  if(visits.length===0){
    tbody.innerHTML='<tr><td colspan="5" class="no-data">No visits recorded yet. Share your portfolio to start tracking!</td></tr>';
  } else {
    var reversed = visits.slice().reverse();
    reversed.forEach(function(v,i){
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+(visits.length-i)+'</td><td>'+new Date(v.time).toLocaleString()+'</td><td>'+v.country+'</td><td>'+v.region+'</td><td>'+v.city+'</td>';
      tbody.appendChild(tr);
    });
  }
}
</script>
</body>
</html>
